# RL v7: FashionMNIST — fixed-tier reward (no moving baseline)
#   -0.5 fault / 0 below baseline / +0.2 in [baseline, 0.9] / +1 if >0.9
max_steps = 50
seq_len = 8192

[deployment]
num_train_gpus = 1
num_infer_gpus = 1

[inference]
[inference.model]
max_model_len = 32768
enforce_eager = true

[wandb]
project = "mlgym-scientist-rl"
name = "fmnist_v7_fixed_tier"

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[orchestrator]
batch_size = 8
rollouts_per_example = 8
use_token_client = false

[ckpt]
interval = 10

[orchestrator.client]
base_url = ["http://localhost:8000/v1"]
connect_timeout = 120.0

[orchestrator.sampling]
max_tokens = 1024

[[orchestrator.env]]
id = "mlgym_tree_env_v2"
name = "mlgym_fmnist"
args = { task = "fashionMnist", node_budget = 2, executor_url = "https://api.anthropic.com/v1/", executor_model = "claude-sonnet-4-20250514", max_actions = 15, num_train_examples = 100, num_eval_examples = 10, reward_scheme = "v7_fixed_tier" }

[trainer.model.lora]
rank = 32
alpha = 64

[trainer.model.ac]
freq = 1

[trainer.loss]
kl_tau = 0.01

[trainer.optim]
lr = 5e-5
