# PRIME-RL config for MLGym Tree Search RL training
# Scientist model learns to propose experiments via multi-turn tree search
# with real MLGym execution rewards.

max_steps = 50
seq_len = 8192

[deployment]
num_train_gpus = 1
num_infer_gpus = 1

[wandb]
project = "mlgym-scientist-rl"
name = "titanic_tree_search"

[ckpt]
# Checkpoint at end of training

[model]
name = "Qwen/Qwen3-4B-Instruct-2507"

[orchestrator]
batch_size = 16
rollouts_per_example = 4

[[orchestrator.env]]
id = "air.ttt.mlgym_env"
name = "mlgym_titanic"
args = { task = "titanic", node_budget = 5, executor_url = "http://localhost:8001/v1", executor_model = "Qwen/Qwen3-4B-Instruct-2507", max_actions = 15 }

[orchestrator.sampling]
max_tokens = 512

[trainer]
# Default trainer config

[inference.parallel]
dp = 1
